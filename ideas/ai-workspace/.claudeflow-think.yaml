name: "AI Workspace"
idea_file: "idea.md"

context: |
  しょうごの個人開発プロジェクト。
  Mac mini M4 / Home Assistant / TeslaMate / ClaudeFlow などの自動化インフラを運用しており、
  それらを一つのAIネイティブなワークスペースで統合することが長期的なゴール。
  
  現時点の開発リソース: 個人（しょうご一人）。フルタイムではなくサイドプロジェクト。
  技術スタック経験: React / TypeScript / Python / Home Assistant / GitHub。
  将来的に他のユーザーにも使わせたいが、フェーズ1はローカル動作の個人ツールとして開始する。

review_prompt: |
  以下の観点で idea.md を分析し、人間がまだ気づいていない視点・懸念・盲点を提示してください。

  【分析の優先順位】
  1. 取り返しのつかない決断・行動が含まれているか（🔴）
  2. 暗黙に仮定しているが検証されていないことは何か（❓）
  3. 選んでいない選択肢の中に、本当は良いものがないか（🟡）
  4. 「個人ツール → 他人向けプロダクト」の移行で生じる設計負債はないか（🟡）
  5. 人間の生活リズム・習慣・感情への影響が考慮されているか（💭）
  6. 「正しい」けど「心地よくない」可能性はないか（💭）

  【スタイルの指針】
  - 断定せず「〜かもしれません」「〜という懸念はないでしょうか」の形で提示する
  - 完成を宣言しない。「最近こういう傾向があるように見える」という姿勢を保つ
  - 書かれていないことの中に重要な観点が隠れている可能性を意識する
  - ✅ は本当によく考えられている部分のみ（無理に埋めない）

refine_prompt: |
  REVIEW.md の承認済み項目を idea.md に反映してください。
  [x] のみの項目は idea.md の適切なセクションを更新・追記する。
  [x] ❌ の項目は「## 意識的に考慮したが却下した観点」に却下理由と共に記録する。
  反映後は REVIEW.md の該当行を「- [x] #XXX ✅ 反映済み」に更新する。

notify: true
auto_review: true

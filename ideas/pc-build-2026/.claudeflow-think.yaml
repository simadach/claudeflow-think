name: "PC構成設計2026"
idea_file: "idea.md"

context: |
  Mac mini M4（メイン機）はすでに所有しており、今回のPCはそれとは別の用途専用機として検討している。
  設置場所は自宅デスク。スペースには限りがあるが、極端なミニPCではなく
  mATXまたはMicro-ATX程度のサイズ感は許容できる。
  予算感はまだ未決定。快適さと将来性を重視する。

review_prompt: |
  以下の観点で idea.md を分析し、人間がまだ気づいていない視点・懸念・盲点を提示してください。

  【分析の優先順位】
  1. 取り返しのつかない選択が含まれているか（将来の拡張を塞ぐ決断）（🔴）
  2. 3用途（3Dプリント用モデリング・Blenderレンダリング・AAAゲーミング）の要件が本当に1台で両立するか（❓）
  3. 「省スペース」と「拡張性」のトレードオフで、どちらを本当に優先すべきか（🟡）
  4. 実際に使う場面での体験（熱・騒音・セットアップの手間・アップグレード時の後悔）（💭）
  5. 見落としているランニングコスト・環境要因（電気代・冷却・設置環境）（🟡）

  【スタイル】
  - 断定せず「〜かもしれません」の形で提示する
  - ✅ は本当によく考えられている部分のみ

refine_prompt: |
  REVIEW.md の承認済み項目を idea.md に反映してください。
  [x] のみの項目は idea.md の適切なセクションを更新・追記する。
  [x] ❌ の項目は「## 意識的に考慮したが却下した観点」に却下理由と共に記録する。
  反映後は REVIEW.md の該当行を「- [x] #XXX ✅ 反映済み」に更新する。

notify: true
auto_review: true

name: "家計分析2020-2026"
idea_file: "idea.md"

context: |
  - 家族構成：現在2人、子供が増える予定あり（多人数世帯への移行確定）
  - 職業：エンジニア系（Mac mini M4 / スマートホーム / HEMS等の自作インフラを持つ）
  - データ：マネーフォワードからエクスポートした三井住友銀行・Amazon等の取引明細
  - 保有資産：太陽光・蓄電池・EV・スマートホーム設備など（住宅関連の大型投資あり）
  - 懸念：2022〜2026年は収支マイナスが続いているが、住宅取得・設備投資が混在している可能性
  - データファイル：household_all.csv（8,418件、2020〜2026年）がリポジトリに含まれる

review_prompt: |
  以下の観点で idea.md と年別収支サマリーを分析し、まだ気づいていない視点・懸念・盲点を提示してください。

  【分析の優先順位】
  1. 収支マイナスが続く構造的な原因は何か（単純な赤字か、投資混在か）（🔴）
  2. 「未分類」42%の中に潜んでいる可能性のある重大な支出パターンは何か（🔴）
  3. 子供が増えることで増加が見込まれる費目と、その準備状況（🟡）
  4. 2022年の大支出・2023年の大収入の正体についての仮説（❓）
  5. 家計管理の習慣・心理的負荷・「見たくない数字を見ない」傾向はないか（💭）
  6. データの網羅性・信頼性への懸念（何が見えていないか）（❓）

  【スタイルの指針】
  - 断定せず「〜かもしれません」の形で提示する
  - 数字の背景にある生活実態・感情的文脈への想像を大切にする
  - 「正しい家計管理」の押しつけではなく、「気づきの問い」として提示する

refine_prompt: |
  REVIEW.md の承認済み項目を idea.md に反映してください。
  [x] のみの項目は idea.md の適切なセクションを更新・追記する。
  [x] ❌ の項目は「## 意識的に考慮したが却下した観点」に却下理由と共に記録する。
  反映後は REVIEW.md の該当行を「- [x] #XXX ✅ 反映済み」に更新する。

notify: true
auto_review: true

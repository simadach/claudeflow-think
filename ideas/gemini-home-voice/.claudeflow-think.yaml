name: "Gemini Home Voice"
idea_file: "idea.md"

context: |
  Mac mini M4 + Home Assistant によるスマートホーム環境。
  太陽光発電・蓄電池・Tesla EV充電・在室検知・HEMS（電力コスト最適化）が稼働中。
  Google Nest Mini が既存環境にある（詳細未確認）。
  家族構成：夫婦 + 子供（今後増える予定）。
  既存の自動化は高度だが、操作インターフェースはダッシュボード・定型音声に限られている。
  Gemini API・Google Cloud の利用経験は限定的。

review_prompt: |
  以下の観点で idea.md を分析し、人間がまだ気づいていない視点・懸念・盲点を提示してください。

  【分析の優先順位】
  1. 取り返しのつかない決断・行動が含まれているか（🔴）
  2. 暗黙に仮定しているが検証されていないことは何か（❓）- 特に Gemini と Nest Mini の技術的接続経路
  3. 選んでいない選択肢の中に本当に良いものがないか（🟡）- 代替アーキテクチャ・既存統合
  4. 人間関係・家族・生活リズムへの影響が考慮されているか（💭）
  5. 「正しい」けど「心地よくない」可能性はないか（💭）- 話しかけられる頻度・プライバシー感

  【特に注目してほしい点】
  - Google Nest Mini を Gemini のカスタム音声 I/O として使う技術的実現可能性
  - HA の既存 Gemini 統合で何ができて何ができないか
  - プロアクティブ通知（AIから話しかける）の実装の複雑さと運用コスト
  - クラウド依存によるプライバシーリスク・障害リスク

  【スタイルの指針】
  - 断定せず「〜かもしれません」「〜という懸念はないでしょうか」の形で提示する
  - 完成を宣言しない
  - 書かれていないことの中に重要な観点が隠れている可能性を意識する

refine_prompt: |
  REVIEW.md の承認済み項目を idea.md に反映してください。
  [x] のみの項目は idea.md の適切なセクションを更新・追記する。
  [x] ❌ の項目は「## 意識的に考慮したが却下した観点」に却下理由と共に記録する。
  反映後は REVIEW.md の該当行を「- [x] #XXX ✅ 反映済み」に更新する。

notify: true
auto_review: true

name: "デュアルディスプレイ環境構築2026"
idea_file: "idea.md"

context: |
  Mac Mini M4（メイン機）を所有済み。将来的にWindowsワークステーションを追加予定。
  既存モニター：LG 32UL750-W（VA・HDR600・USB-C 60W・4K・31.5インチ）を1台所有。
  自宅デスクに設置。Mac/Windows両対応のデュアルディスプレイ環境を構築したい。
  予算は追加費用ベースで10万円前後を想定。

review_prompt: |
  以下の観点で idea.md を分析し、人間がまだ気づいていない視点・懸念・盲点を提示してください。

  【分析の優先順位】
  1. 購入前に確認すべき互換性リスク（Auto Input Detection・MST Hub品質・DP対応）（🔴）
  2. Mac/Windows切り替え体験が実際に快適かどうか（待機時間・手間・誤作動リスク）（💭）
  3. 将来のWindows WS購入時に構成変更が必要になる可能性（❓）
  4. 32U720A-BとのHDR品質差が日常使いでどの程度気になるか（💭）
  5. 見落としているセットアップの手間・ケーブル管理の煩雑さ（🟡）

  【スタイル】
  - 断定せず「〜かもしれません」の形で提示する
  - ✅ は本当によく考えられている部分のみ

refine_prompt: |
  REVIEW.md の承認済み項目を idea.md に反映してください。
  [x] のみの項目は idea.md の適切なセクションを更新・追記する。
  [x] ❌ の項目は「## 意識的に考慮したが却下した観点」に却下理由と共に記録する。
  反映後は REVIEW.md の該当行を「- [x] #XXX ✅ 反映済み」に更新する。

notify: true
auto_review: true

name: "{{NAME}}"
idea_file: "idea.md"

context: |
  {{CONTEXT}}

review_prompt: |
  以下の観点で idea.md を分析し、人間がまだ気づいていない視点・懸念・盲点を提示してください。

  【分析の優先順位】
  1. 取り返しのつかない決断・行動が含まれているか（🔴）
  2. 暗黙に仮定しているが検証されていないことは何か（❓）
  3. 選んでいない選択肢の中に、本当は良いものがないか（🟡）
  4. 人間関係・感情・習慣・生活リズムへの影響が考慮されているか（💭）
  5. 「正しい」けど「心地よくない」可能性はないか（💭）

  【スタイルの指針】
  - 断定せず「〜かもしれません」「〜という懸念はないでしょうか」の形で提示する
  - 完成を宣言しない。「最近こういう傾向があるように見える」という姿勢を保つ
  - 書かれていないことの中に重要な観点が隠れている可能性を意識する
  - ✅ は本当によく考えられている部分のみ（無理に埋めない）

refine_prompt: |
  REVIEW.md の承認済み項目を idea.md に反映してください。
  [x] のみの項目は idea.md の適切なセクションを更新・追記する。
  [x] ❌ の項目は「## 意識的に考慮したが却下した観点」に却下理由と共に記録する。
  反映後は REVIEW.md の該当行を「- [x] #XXX ✅ 反映済み」に更新する。

notify: true
auto_review: true
